<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e4e6f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(22, 23, 31, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .sub { color: #8b8fa3; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #8b8fa3; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-create { background: linear-gradient(135deg, #6C5CE7, #00CEFF); color: #fff; }
    .btn-join { background: rgba(255,255,255,0.1); color: #e4e6f0; }
    button:hover { opacity: 0.9; }
    .hint { font-size: 12px; color: #5a5e72; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Multiplayer Browser</h1>
    <p class="sub">Browse any site together. Install the Chrome extension to start.</p>
    <label>Your name</label>
    <input type="text" id="userName" placeholder="Your name" value="Guest">
    <label>Room ID (leave empty to create)</label>
    <input type="text" id="roomId" placeholder="Paste room ID or leave empty">
    <button class="btn-create" id="btnCreate">Create room</button>
    <button class="btn-join" id="btnJoin">Join room</button>
    <p class="hint">Share the room ID with others. When anyone navigates, everyone follows.</p>
  </div>
  <script>
    const API = window.location.origin;
    document.getElementById('btnCreate').onclick = async () => {
      const name = document.getElementById('userName').value || 'Guest';
      const res = await fetch(API + '/api/room', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
      const { roomId } = await res.json();
      navigator.clipboard.writeText(roomId);
      alert('Room created! ID copied: ' + roomId);
      document.getElementById('roomId').value = roomId;
    };
    document.getElementById('btnJoin').onclick = () => {
      const roomId = document.getElementById('roomId').value.trim();
      if (!roomId) return alert('Enter a room ID');
      window.location.href = '/?room=' + encodeURIComponent(roomId);
    };
  </script>
</body>
</html>
