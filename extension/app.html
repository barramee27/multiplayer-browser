<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Multiplayer Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font: 14px system-ui, -apple-system, sans-serif;
      background: #0d0d0f;
      color: #e4e6f0;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
    }
    .header {
      padding: 24px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, #6C5CE7 0%, #00CEFF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .section:last-of-type { border-bottom: none; }
    .section-title {
      font-size: 12px;
      color: #8b8fa3;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    input, button, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 14px;
      margin-bottom: 10px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #6C5CE7;
    }
    button {
      cursor: pointer;
      border: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.8; }
    .btn-primary {
      background: linear-gradient(135deg, #6C5CE7, #00CEFF);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e4e6f0;
    }
    .btn-danger {
      background: rgba(239,68,68,0.25);
      color: #f87171;
    }
    .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .btn-row button { flex: 1; margin-bottom: 0; }
    .chat-area {
      min-height: 180px;
      max-height: 280px;
      overflow-y: auto;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .chat-msg { margin-bottom: 10px; }
    .chat-msg .name { font-weight: 600; margin-right: 8px; }
    .chat-msg .time { color: #5a5e72; font-size: 11px; }
    .users-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .user-chip {
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      background: rgba(108,92,231,0.2);
    }
    .voice-btn { padding: 12px; }
    .voice-btn.muted { opacity: 0.5; }
    .inject-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .inject-row select { width: auto; margin-bottom: 0; flex: 0 0 100px; }
    textarea.inject-content {
      min-height: 100px;
      resize: vertical;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
    .hint {
      font-size: 12px;
      color: #5a5e72;
      margin-top: 8px;
    }
    .inject-preview {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
    }
    .inject-preview-header {
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .inject-preview-header button {
      background: none;
      border: none;
      color: #8b8fa3;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      margin: 0;
      width: auto;
    }
    .inject-preview iframe {
      width: 100%;
      height: 200px;
      border: none;
      display: block;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Multiplayer Browser</h1>
    </div>

    <div class="section" id="joinSection">
      <div class="section-title">Room</div>
      <input type="text" id="userName" placeholder="Your name" value="Guest">
      <input type="text" id="roomId" placeholder="Room ID">
      <div class="btn-row">
        <button class="btn-primary" id="btnJoin">Join room</button>
        <button class="btn-secondary" id="btnCreate">Create new room</button>
      </div>
    </div>

    <div class="section hidden" id="inRoomSection">
      <div class="section-title">In room</div>
      <div class="users-row" id="usersList"></div>
      <button class="btn-danger" id="btnLeave">Leave room</button>
    </div>

    <div class="section hidden" id="chatSection">
      <div class="section-title">Chat</div>
      <div class="chat-area" id="chatArea"></div>
      <input type="text" id="chatInput" placeholder="Type a message...">
    </div>

    <div class="section hidden" id="voiceSection">
      <div class="section-title">Voice</div>
      <button class="voice-btn btn-primary" id="btnVoice">Unmute</button>
    </div>

    <div class="section hidden" id="injectSection">
      <div class="section-title">Inject code (to everyone in room)</div>
      <div class="inject-row">
        <select id="injectType">
          <option value="html">HTML</option>
          <option value="js">JavaScript</option>
          <option value="css">CSS</option>
        </select>
      </div>
      <textarea id="injectContent" class="inject-content" placeholder="Paste HTML, JS, or CSS..."></textarea>
      <button class="btn-primary" id="btnInject">Inject to room</button>
      <p class="hint">Runs in sandbox. Cannot access cookies or page data.</p>
      <div id="injectPreview" class="inject-preview hidden">
        <div class="inject-preview-header">
          <span>Preview</span>
          <button type="button" id="injectPreviewClose">×</button>
        </div>
        <iframe id="injectPreviewFrame" sandbox="allow-scripts"></iframe>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Built-in Proxy (Privacy)</div>
      <label class="hint" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;">
        <input type="checkbox" id="proxyEnabled">
        <span>Route browser traffic through proxy</span>
      </label>
      <input type="text" id="proxyHost" placeholder="Proxy host (e.g. proxy.example.com or 127.0.0.1)" style="margin-bottom:6px;">
      <input type="text" id="proxyPort" placeholder="Port (e.g. 8080)" style="margin-bottom:6px;">
      <p class="hint">Uses Chrome proxy API. Enter your proxy server. Disable to use direct connection.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
