<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 420px;
      font: 13px system-ui, sans-serif;
      background: #1a1b26;
      color: #e4e6f0;
    }
    .header {
      padding: 16px;
      background: linear-gradient(135deg, #6C5CE7 0%, #00CEFF 100%);
      color: #fff;
      font-weight: 600;
    }
    .section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .section-title { font-size: 11px; color: #8b8fa3; text-transform: uppercase; margin-bottom: 8px; }
    input, button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 13px;
      margin-bottom: 8px;
    }
    button { cursor: pointer; border: none; font-weight: 500; }
    .btn-primary { background: linear-gradient(135deg, #6C5CE7, #00CEFF); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #e4e6f0; }
    .btn-danger { background: rgba(239,68,68,0.3); color: #f87171; }
    .chat-area {
      height: 160px;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .chat-msg { margin-bottom: 6px; }
    .chat-msg .name { font-weight: 600; margin-right: 6px; }
    .chat-msg .time { color: #5a5e72; font-size: 10px; }
    .users-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .user-chip {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: rgba(108,92,231,0.2);
    }
    .voice-btn { width: 100%; padding: 10px; }
    .voice-btn.muted { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="header">Multiplayer Browser</div>
  <div class="section">
    <div class="section-title">Room</div>
    <input type="text" id="userName" placeholder="Your name" value="Guest">
    <input type="text" id="roomId" placeholder="Room ID">
    <button class="btn-primary" id="btnJoin">Join room</button>
    <button class="btn-secondary" id="btnCreate">Create new room</button>
  </div>
  <div class="section" id="inRoomSection" style="display:none;">
    <div class="section-title">In room</div>
    <div class="users-row" id="usersList"></div>
    <button class="btn-danger" id="btnLeave">Leave room</button>
  </div>
  <div class="section" id="chatSection" style="display:none;">
    <div class="section-title">Chat</div>
    <div class="chat-area" id="chatArea"></div>
    <input type="text" id="chatInput" placeholder="Type a message...">
  </div>
  <div class="section" id="voiceSection" style="display:none;">
    <div class="section-title">Voice</div>
    <button class="voice-btn btn-primary" id="btnVoice">Unmute</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
