# Nginx config for multiplayer.codemesh.org
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled
# Or include in your main nginx.conf

# HTTP -> HTTPS redirect (uncomment after SSL is set up)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name multiplayer.codemesh.org;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name multiplayer.codemesh.org;

    # For Let's Encrypt certbot challenge (before SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # Proxy to Node.js server (HTTP only until SSL is configured)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

